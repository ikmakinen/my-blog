name: Deploy Hugo site

on:
  push:
    branches:
      - main  # triggers workflow on push to main branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo with theme submodule
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: true

      # 2. Setup Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # 3. Build the site
      - name: Build Hugo site
        run: hugo --minify

      # 4. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_repo: ikmakinen/ikmakinen.github.io
          force_orphan: true